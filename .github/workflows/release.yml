name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: |
            main.js
            manifest.json
            styles.css

  build-binaries:
    uses: ./.github/workflows/build-node-pty.yml
    with:
      node-pty-version: "1.1.0"

  release:
    needs: [build-plugin, build-binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            # node-pty platform zips and checksums.json are NOT for Obsidian.
            # They are fetched on-demand by BinaryManager when the user clicks
            # "Download binaries" in plugin settings. Obsidian only uses
            # main.js, manifest.json, and styles.css from this release.
            node-pty-*.zip
            checksums.json
          generate_release_notes: true
